# ── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ── DataSource (PostgreSQL) ───────────────────────────────────────────────────
# Override via env-vars in Docker: SPRING_DATASOURCE_URL, etc.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taskmanager}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# 'update' auto-creates/alters tables on startup — use 'validate' in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ───────────────────────────────────────────────────────────────────────
# Secret: a Base64-encoded 256-bit key.
# IMPORTANT: Override this with a strong secret via env-var in production.
app.jwt.secret=${JWT_SECRET:dGFza21hbmFnZXJfc2VjcmV0X2tleV9mb3JfcG9ydGZvbGlvX2RlbW9fMjAyNA==}
# Token validity: 86400000 ms = 24 hours
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Springdoc / Swagger UI ────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.try-it-out-enabled=true

# ── Kafka Producer ───────────────────────────────────────────────────────────
# In Docker: KAFKA_BOOTSTRAP_SERVERS=kafka:9092
# Locally (with docker-compose port mapping): localhost:29092
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
# Suppress noisy metadata-fetch warnings on initial connect
spring.kafka.properties.reconnect.backoff.ms=2000
spring.kafka.properties.reconnect.backoff.max.ms=10000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.portfolio.taskmanager=INFO
logging.level.org.springframework.security=WARN
logging.level.org.apache.kafka=WARN
