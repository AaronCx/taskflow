name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  # ── Common Library ────────────────────────────────────────────────────────────
  common:
    name: Common Library (Java 17 + Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and install common library
        run: mvn --batch-mode install -pl libs/common -am -DskipTests

      - name: Upload common JAR
        uses: actions/upload-artifact@v4
        with:
          name: common-jar
          path: libs/common/target/*.jar
          retention-days: 1

  # ── Auth Service ──────────────────────────────────────────────────────────────
  auth-service:
    name: Auth Service (Java 17 + Maven)
    runs-on: ubuntu-latest
    needs: common
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn --batch-mode verify -pl services/auth-service -am
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-test-results
          path: services/auth-service/target/surefire-reports/

  # ── Task Service ──────────────────────────────────────────────────────────────
  task-service:
    name: Task Service (Java 17 + Maven)
    runs-on: ubuntu-latest
    needs: common
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn --batch-mode verify -pl services/task-service -am
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task-service-test-results
          path: services/task-service/target/surefire-reports/

  # ── Notification Service ──────────────────────────────────────────────────────
  notification-service:
    name: Notification Service (Java 17 + Maven)
    runs-on: ubuntu-latest
    needs: common
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn --batch-mode verify -pl services/notification-service -am
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notification-service-test-results
          path: services/notification-service/target/surefire-reports/

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20 + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          # Glob discovers frontend/package-lock.json wherever it lives in the tree
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Build for production
        working-directory: ./frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── Docker Compose Validation ─────────────────────────────────────────────────
  docker:
    name: Docker Compose validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml syntax
        run: docker compose config --quiet
