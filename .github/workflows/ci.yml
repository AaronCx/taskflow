name: CI

on:
  push:
    branches: [main, feature/kafka-notifications]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: Build + Test ────────────────────────────────────────────────────
  backend:
    name: Backend (Java 17 + Maven)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       taskmanager_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        working-directory: ./backend
        run: mvn --batch-mode verify
        env:
          # Tests use H2 via the "test" profile, so no real PG needed here.
          # The Postgres service above is available if you want integration tests.
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

  # ── Frontend: Type-check + Build ─────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20 + Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No cache — avoids setup-node lockfile resolution issues on non-root package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Build for production
        working-directory: ./frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── Notifications Service: Build + Test ──────────────────────────────────────
  notifications:
    name: Notifications Service (Java 17 + Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        working-directory: ./backend-notifications
        run: mvn --batch-mode verify
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notifications-test-results
          path: backend-notifications/target/surefire-reports/

  # ── Docker: Validate compose file ────────────────────────────────────────────
  docker:
    name: Docker Compose validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml syntax
        run: docker compose config --quiet
