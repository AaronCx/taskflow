version: 1

# Top-level path allowlist applied to every content-scanning check.
# The previous config used non-existent keys (`commit-message`, `file-size`,
# `sensitive-files`) that the engine's Zod schema silently stripped. This
# config uses the canonical fields the engine actually reads (see
# packages/engine/src/config/schema.ts in AaronCx/LastGate).
allow:
  # Test fixtures intentionally host example credentials / synthetic tokens
  # to exercise detector regexes.
  - "**/__tests__/**"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.test.js"
  - "**/*.test.jsx"
  - "**/*.spec.ts"
  - "**/*.spec.js"
  - "tests/**"
  - "test/**"
  - "e2e/**"
  # Lockfile integrity hashes routinely trip the entropy scanner.
  - "package-lock.json"
  - "**/package-lock.json"
  - "bun.lock"
  - "**/bun.lock"
  - "yarn.lock"
  - "**/yarn.lock"
  - "pnpm-lock.yaml"
  - "**/pnpm-lock.yaml"
  - "uv.lock"
  - "**/uv.lock"
  - "Cargo.lock"
  - "Pipfile.lock"
  - "poetry.lock"

checks:
  secrets:
    enabled: true
    severity: fail
  file_patterns:
    enabled: true
    severity: fail
    # Replaces the previous (silently stripped) `sensitive-files:` block.
    block:
      - ".env"
      - "*.pem"
      - "*.key"
      - "credentials.*"
      - "*.sqlite"
      - "*.db"
    allow:
      - ".env.example"
      - ".env.sample"
  commit_message:
    enabled: true
    severity: warn
    require_conventional: true
  duplicates:
    enabled: true
    severity: warn
  dependencies:
    enabled: true
    severity: warn
  agent_patterns:
    enabled: true
    severity: warn

protected_branches:
  - main
