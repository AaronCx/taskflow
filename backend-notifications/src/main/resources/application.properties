# ── Server ───────────────────────────────────────────────────────────────────
server.port=8081

# ── DataSource (same PostgreSQL as task-manager) ──────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taskmanager}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# 'update' creates the notifications table and indexes on first boot.
# The shared 'users' table already exists — Hibernate just validates it.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT (must match the task-manager service's secret) ───────────────────────
app.jwt.secret=${JWT_SECRET:dGFza21hbmFnZXJfc2VjcmV0X2tleV9mb3JfcG9ydGZvbGlvX2RlbW9fMjAyNA==}

# ── Kafka Consumer ────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.properties.reconnect.backoff.ms=2000
spring.kafka.properties.reconnect.backoff.max.ms=10000

# ── Springdoc / Swagger UI ────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.portfolio.notifications=INFO
logging.level.org.springframework.security=WARN
logging.level.org.apache.kafka=WARN
